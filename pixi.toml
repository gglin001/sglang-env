[workspace]
authors = ["Allen Guo <guosonglin001@gmail.com>"]
channels = ["conda-forge"]
name = "vllm-env"
platforms = ["linux-64"]
version = "0.1.0"

[dependencies]
python = "3.12.*"
uv = ">=0.8.13,<0.9"

ripgrep = ">=15.1.0,<16"
fd-find = ">=10.3.0,<11"
aria2 = "*"
zellij = ">=0.43.1,<0.44"
unzip = ">=6.0,<7"

huggingface_hub = ">=1.5.0,<2"
modelscope = ">=1.34.0,<2"

[feature.cu129.system-requirements]
cuda = "12.9"

[feature.cu129.dependencies]
python = "3.12.*"
uv = ">=0.8.13,<0.9"

[feature.cu129.target.linux-64.dependencies]
# CONDA_OVERRIDE_CUDA=12.9 pixi i -e cu129
# CONDA_OVERRIDE_CUDA=12.9 pixi add cuda-version=12.9 cuda-toolkit=12.9.1 -p linux-64 -f cu129
cuda-version = "12.9.*"
cuda-toolkit = "12.9.1.*"
# CONDA_OVERRIDE_CUDA=12.9 pixi add pytorch=2.10.0 torchvision -p linux-64 -f cu129
# works with nightly vllm fo now
pytorch = "2.10.0.*"

# cu130
[feature.cu130.system-requirements]
cuda = "13.0"

[feature.cu130.dependencies]
python = "3.12.*"
uv = ">=0.8.13,<0.9"

[feature.cu130.target.linux-64.dependencies]
# CONDA_OVERRIDE_CUDA=13.0 pixi i -e cu130
# CONDA_OVERRIDE_CUDA=13.0 pixi add cuda-version=13.0 -p linux-64 -f cu130
cuda-version = "13.0.*"
# CONDA_OVERRIDE_CUDA=13.0 pixi add cuda-toolkit=13.0 -p linux-64 -f cu130
cuda-toolkit = "13.0.*"
# CONDA_OVERRIDE_CUDA=13.0 pixi add pytorch=2.10.0 torchvision -p linux-64 -f cu130
pytorch = "2.10.0.*"
torchvision = ">=0.25.0,<0.26"

[environments]
# default is implicit
default = { features = ["cu129"] }
# default = { features = ["cu130"] }
cu129 = { features = ["cu129"], no-default-feature = true }
cu130 = { features = ["cu130"], no-default-feature = true }
